<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetAdmin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #060b11;
  --panel:    #0b1520;
  --panel2:   #0f1e2e;
  --border:   #162840;
  --border2:  #1e3a5a;
  --accent:   #00c8f0;
  --accent2:  #00e87a;
  --warn:     #f0a800;
  --danger:   #f03050;
  --text:     #b8d8f0;
  --muted:    #3a5878;
  --dim:      #243040;
  --font-ui:  'Exo 2', sans-serif;
  --font-mono:'Share Tech Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* The page is a strict vertical flex column — header shrinks, #main takes all remaining height */
html{height:100%;overflow:hidden}
body{
  height:100%;
  overflow:hidden;
  display:flex;
  flex-direction:column;   /* ← critical: stacks header + progress + main vertically */
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-ui);
  font-size:14px;
}

/* scanlines */
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px)}

/* ── HEADER ── */
#header{
  display:flex;align-items:center;gap:16px;padding:8px 18px;
  background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;          /* never let header grow or shrink */
  position:relative;overflow:hidden;
  height:48px;
}
#header::after{content:'';position:absolute;bottom:0;left:-100%;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:hline 5s linear infinite}
@keyframes hline{to{left:100%}}

.logo{font-family:var(--font-mono);font-size:18px;color:var(--accent);letter-spacing:4px;
  text-shadow:0 0 10px rgba(0,200,240,.4);white-space:nowrap}
.logo em{color:var(--accent2);font-style:normal;text-shadow:0 0 10px rgba(0,232,122,.4)}
#netinfo{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-left:4px}
#netinfo b{color:var(--accent)}
.hsp{flex:1}

#statsbar{display:flex;gap:18px;font-family:var(--font-mono)}
.stat{display:flex;flex-direction:column;align-items:center;gap:1px}
.sv{font-size:22px;font-weight:700;line-height:1}
.sv.t{color:var(--accent);text-shadow:0 0 8px rgba(0,200,240,.5)}
.sv.on{color:var(--accent2);text-shadow:0 0 8px rgba(0,232,122,.5)}
.sv.off{color:var(--danger)}
.sl{font-size:9px;color:var(--muted);letter-spacing:1.5px}

.hbtn{font-family:var(--font-mono);font-size:11px;padding:5px 14px;border-radius:4px;
  cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .15s;background:transparent}
#bscan{border:1px solid var(--accent);color:var(--accent)}
#bscan:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 12px rgba(0,200,240,.4)}
#bhealth{border:1px solid var(--accent2);color:var(--accent2);margin-left:4px}
#bhealth:hover{background:var(--accent2);color:var(--bg);box-shadow:0 0 12px rgba(0,232,122,.4)}
button:disabled{opacity:.35;cursor:not-allowed}

/* ── PROGRESS ── */
#pgwrap{height:2px;background:var(--border);flex-shrink:0;display:none}
#pgfill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));
  box-shadow:0 0 6px var(--accent);transition:width .3s}

/* ── MAIN — horizontal split, fills all space below header ── */
#main{
  display:flex;
  flex-direction:row;
  flex:1 1 0;             /* grow to fill, shrink if needed, basis 0 */
  min-height:0;           /* allow flex children to shrink below content size */
  overflow:hidden;
}

/* ── MAP PANEL (left) ── */
#mapp{
  flex:0 0 50%;           /* fixed 50% width, never grows/shrinks */
  display:flex;
  flex-direction:column;
  border-right:2px solid var(--border);
  min-width:0;
  overflow:hidden;        /* contain everything inside */
}
#mapbar{
  display:flex;align-items:center;gap:10px;padding:5px 12px;
  background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;          /* toolbar never changes height */
  font-family:var(--font-mono);font-size:11px;
}
.maptitle{color:var(--accent);letter-spacing:2px}
.msp{flex:1}
.fbtn{background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:3px 9px;border-radius:3px;cursor:pointer;font-family:var(--font-mono);font-size:10px;transition:all .15s}
.fbtn.on,.fbtn:hover{border-color:var(--accent);color:var(--accent)}
#srch{background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:3px;
  padding:3px 9px;color:var(--text);font-family:var(--font-mono);font-size:11px;width:150px;outline:none}
#srch:focus{border-color:var(--accent)}
#srch::placeholder{color:var(--muted)}

/* mapwrap fills the column, canvas is sized by JS not CSS */
#mapwrap{
  flex:1 1 0;             /* fill remaining vertical space in #mapp */
  position:relative;
  overflow:hidden;
  min-height:0;
  min-width:0;
}
/* Do NOT set canvas width/height via CSS — JS controls it imperatively */
#mc{display:block;cursor:grab}
#mc:active{cursor:grabbing}

/* ── SCAN OVERLAY ── */
#sovl{position:absolute;inset:0;background:rgba(6,11,17,.88);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:50}
#sovl.vis{display:flex}
#sovmsg{font-family:var(--font-mono);color:var(--accent);font-size:13px;letter-spacing:2px}
.sbwrap{width:280px;height:3px;background:var(--border);border-radius:2px}
.sbfill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:2px;box-shadow:0 0 6px var(--accent);transition:width .35s}

/* ── TOOLTIP ── */
#tt{position:fixed;background:rgba(6,11,17,.97);border:1px solid var(--accent);border-radius:5px;
  padding:9px 13px;font-family:var(--font-mono);font-size:11px;line-height:1.8;
  pointer-events:none;z-index:8000;display:none;min-width:210px;
  box-shadow:0 0 18px rgba(0,200,240,.2)}
.ttn{color:var(--accent);font-size:13px;font-weight:bold;margin-bottom:3px;border-bottom:1px solid var(--border);padding-bottom:4px}
.ttr{display:flex;gap:6px}
.ttk{color:var(--muted);width:58px;flex-shrink:0}
.ttv{color:var(--text)}
.tton{color:var(--accent2)}
.ttoff{color:var(--danger)}

/* ── DETAIL PANEL (right) ── */
#detailp{
  flex:1 1 0;             /* fills the other 50%, grows/shrinks within row */
  display:flex;
  flex-direction:column;
  overflow:hidden;
  min-width:0;
}

/* ── DOSSIER ── */
#dossier{flex:1 1 0;overflow-y:auto;overflow-x:hidden;padding:0;min-height:0}
#dossier::-webkit-scrollbar{width:4px}
#dossier::-webkit-scrollbar-thumb{background:var(--border2)}

/* empty state */
#dempty{display:flex;align-items:center;justify-content:center;height:100%;
  color:var(--muted);font-family:var(--font-mono);font-size:12px;text-align:center;line-height:2.2}

/* dossier layout */
.dos-wrap{display:flex;height:100%}

/* LEFT SIDEBAR — identity column */
.dos-id{flex:0 0 220px;background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:0;overflow:hidden}
.dos-id-top{padding:14px 16px;border-bottom:1px solid var(--border)}
.dos-badge{width:56px;height:56px;border-radius:50%;border:2px solid currentColor;
  display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px;
  position:relative}
.dos-badge-status{position:absolute;bottom:2px;right:2px;width:10px;height:10px;
  border-radius:50%;border:2px solid var(--panel)}
.dos-badge-status.online{background:var(--accent2)}
.dos-badge-status.offline{background:var(--danger)}
.dos-hostname{font-family:var(--font-mono);font-size:13px;color:var(--text);
  text-align:center;word-break:break-all;line-height:1.4}
.dos-ip{font-family:var(--font-mono);font-size:11px;color:var(--accent);text-align:center;margin-top:2px}
.dos-status-label{font-family:var(--font-mono);font-size:10px;text-align:center;
  margin-top:6px;letter-spacing:1px;padding:3px 8px;border-radius:3px;display:inline-block;
  width:fit-content;margin-left:auto;margin-right:auto}
.dos-status-label.online{background:rgba(0,232,122,.1);color:var(--accent2);border:1px solid rgba(0,232,122,.3)}
.dos-status-label.offline{background:rgba(240,48,80,.1);color:var(--danger);border:1px solid rgba(240,48,80,.3)}

.dos-fields{padding:10px 14px;flex:1;overflow-y:auto}
.dos-fields::-webkit-scrollbar{width:3px}
.dos-fields::-webkit-scrollbar-thumb{background:var(--border)}
.dos-field{margin-bottom:10px}
.dos-field-key{font-family:var(--font-mono);font-size:9px;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.dos-field-val{font-family:var(--font-mono);font-size:12px;color:var(--text);word-break:break-all;line-height:1.4}
.dos-field-val.accent{color:var(--accent)}
.dos-field-val.green{color:var(--accent2)}
.dos-field-val.warn{color:var(--warn)}
.dos-field-val.danger{color:var(--danger)}
.dos-field-val.muted{color:var(--muted)}

/* RIGHT MAIN — detail content */
.dos-main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* HEADER BAR inside dossier */
.dos-hdr{padding:8px 16px;background:var(--panel2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;font-family:var(--font-mono);font-size:11px}
.dos-hdr-title{color:var(--accent2);letter-spacing:2px;text-transform:uppercase}
.dos-hdr-ip{color:var(--muted)}
.dos-hdr-sp{flex:1}
.dos-action{font-family:var(--font-mono);font-size:10px;padding:4px 12px;border-radius:3px;
  cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all .15s;background:transparent}
.dos-action.scan{border:1px solid var(--accent2);color:var(--accent2)}
.dos-action.scan:hover{background:var(--accent2);color:var(--bg)}
.dos-action.ping{border:1px solid var(--accent);color:var(--accent)}
.dos-action.ping:hover{background:var(--accent);color:var(--bg)}
.dos-action.trace{border:1px solid var(--muted);color:var(--muted)}
.dos-action.trace:hover{border-color:var(--warn);color:var(--warn)}

/* SECTIONS */
.dos-sections{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.dos-sections::-webkit-scrollbar{width:4px}
.dos-sections::-webkit-scrollbar-thumb{background:var(--border2)}

.dos-section{background:var(--panel);border:1px solid var(--border);border-radius:5px;overflow:hidden}
.dos-section-hdr{padding:6px 12px;background:var(--panel2);border-bottom:1px solid var(--border);
  font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:2px;
  text-transform:uppercase;display:flex;align-items:center;gap:8px}
.dos-section-hdr::before{content:'';width:3px;height:12px;background:var(--accent);
  border-radius:2px;flex-shrink:0}
.dos-section-body{padding:10px 12px}

/* grid of fields inside a section */
.dos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px 14px}
.dos-gfield{display:flex;flex-direction:column;gap:2px}
.dos-gkey{font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.dos-gval{font-family:var(--font-mono);font-size:12px;color:var(--text);word-break:break-all;line-height:1.35}
.dos-gval.accent{color:var(--accent)} .dos-gval.green{color:var(--accent2)}
.dos-gval.warn{color:var(--warn)} .dos-gval.danger{color:var(--danger)}
.dos-gval.muted{color:var(--muted)}

/* ports */
.port-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)}
.port-row:last-child{border-bottom:none}
.port-num{font-family:var(--font-mono);font-size:11px;color:var(--accent);width:46px;flex-shrink:0}
.port-svc{font-family:var(--font-mono);font-size:11px;color:var(--text)}
.port-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);flex-shrink:0}

/* terminal */
.dos-terminal{background:#020a10;border-radius:4px;padding:8px 10px;
  font-family:var(--font-mono);font-size:11px;color:var(--accent2);
  white-space:pre-wrap;max-height:160px;overflow-y:auto;line-height:1.5}
.dos-terminal::-webkit-scrollbar{width:3px}
.dos-terminal::-webkit-scrollbar-thumb{background:var(--border)}
.dos-terminal .t-cmd{color:var(--muted)}

/* latency bar */
.lat-bar-wrap{margin-top:4px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;width:100%}
.lat-bar{height:100%;border-radius:2px;transition:width .4s}
.lat-bar.good{background:var(--accent2)}
.lat-bar.ok{background:var(--warn)}
.lat-bar.bad{background:var(--danger)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .25s ease both}
</style>
</head>
<body>

<div id="header">
  <div class="logo">NET<em>ADMIN</em></div>
  <div id="netinfo">NET: <b id="hnet">—</b> &nbsp;|&nbsp; HOST: <b id="hhost">—</b></div>
  <div class="hsp"></div>
  <div id="statsbar">
    <div class="stat"><div class="sv t" id="st">0</div><div class="sl">TOTAL</div></div>
    <div class="stat"><div class="sv on" id="so">0</div><div class="sl">ONLINE</div></div>
    <div class="stat"><div class="sv off" id="sf">0</div><div class="sl">OFFLINE</div></div>
  </div>
  <button class="hbtn" id="bscan" onclick="startScan()">⟳ SCAN</button>
  <button class="hbtn" id="bhealth" onclick="doHealth()">♥ HEALTH</button>
</div>

<div id="pgwrap"><div id="pgfill" style="width:0%"></div></div>

<div id="main">

  <!-- MAP -->
  <div id="mapp">
    <div id="mapbar">
      <span class="maptitle">▸ NETWORK MAP</span>
      <div class="msp"></div>
      <button class="fbtn on" onclick="setFilter('all',this)">ALL</button>
      <button class="fbtn"    onclick="setFilter('online',this)">ONLINE</button>
      <button class="fbtn"    onclick="setFilter('offline',this)">OFFLINE</button>
      <input id="srch" type="text" placeholder="search…" oninput="onSearch(this.value)">
    </div>
    <div id="mapwrap">
      <canvas id="mc"></canvas>
      <div id="sovl">
        <div id="sovmsg">SCANNING NETWORK…</div>
        <div class="sbwrap"><div class="sbfill" id="sbf" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- DETAIL / DOSSIER -->
  <div id="detailp">
    <div id="dossier">
      <div id="dempty">
        <div>◈ SELECT A DEVICE ON THE MAP<br>
          <span style="font-size:10px;color:#1e3a5a">hover for quick info · click for full dossier</span>
        </div>
      </div>
    </div>
  </div>

</div>

<div id="tt"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let devices  = [];
let filter   = 'all';
let searchQ  = '';
let selected = null;
let scanPoll = null;
let nodes    = [];          // {ip, x, y, r, online, hostname, ...}
let hovered  = null;

// Canvas pan/zoom
let panX=0, panY=0, zoom=1;
let isPanning = false;
let panStart  = {x:0,y:0};

// Node drag
let dragNode  = null;
let dragOffX  = 0, dragOffY = 0;
let didDrag   = false;     // distinguish drag vs click

const canvas = document.getElementById('mc');
const ctx    = canvas.getContext('2d');

// ─── Type maps ───────────────────────────────────────────────────────────────
const TICON = {
  'Router/Switch':'⬡','Windows PC':'⊞','Linux Server':'▣','Linux/SSH Device':'▣',
  'Web Server':'◎','DNS Server':'◈','Apple Device':'◍','Smart TV/Media':'▣',
  'Mobile/IoT':'◎','SBC/IoT':'◈','Network Device':'⬡','Windows/Samba':'⊞',
  'This Host':'★','Unknown Device':'○'
};
const TCOL = {
  'Router/Switch':'#00c8f0','Windows PC':'#5577ff','Linux Server':'#00e87a',
  'Linux/SSH Device':'#00e87a','Web Server':'#f0a800','DNS Server':'#dd88ff',
  'Apple Device':'#aabbff','Smart TV/Media':'#ff6640','Mobile/IoT':'#ffdd44',
  'SBC/IoT':'#44ffdd','Network Device':'#00c8f0','Windows/Samba':'#5577ff',
  'This Host':'#ffffff','Unknown Device':'#3a5878'
};

function dColor(d){ return d.online ? (TCOL[d.device_type]||'#3a5878') : '#2a1520' }
function dIcon(d){ return d.is_self ? '★' : (TICON[d.device_type]||'○') }

// ─── Grid Layout (5 columns, no hub) ─────────────────────────────────────────
const COLS = 5;
const CELL_W = 120;
const CELL_H = 90;
const MARGIN = 40;
const NODE_R = 22;

function layoutNodes(devs) {
  // Preserve positions of already-placed nodes so dragging survives filter changes
  const existing = {};
  nodes.forEach(n => { existing[n.ip] = {x:n.x, y:n.y} });

  return devs.map((d, i) => {
    if (existing[d.ip]) {
      // keep user-moved position
      return { ...d, x: existing[d.ip].x, y: existing[d.ip].y, r: NODE_R };
    }
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    return {
      ...d,
      x: MARGIN + col * CELL_W + CELL_W / 2,
      y: MARGIN + row * CELL_H + CELL_H / 2,
      r: NODE_R
    };
  });
}

function resetLayout() {
  // Wipe positions so next layoutNodes uses fresh grid
  nodes = [];
  nodes = layoutNodes(filteredDevices());
}

// ─── Canvas ──────────────────────────────────────────────────────────────────
// ─── Canvas sizing — driven entirely by JS, never by CSS width/height ────────
function resizeCanvas() {
  const wrap = document.getElementById('mapwrap');
  const rect  = wrap.getBoundingClientRect();
  // Only resize if dimensions actually changed (avoids thrashing during dossier render)
  if (canvas.width === Math.floor(rect.width) && canvas.height === Math.floor(rect.height)) return;
  canvas.width  = Math.floor(rect.width);
  canvas.height = Math.floor(rect.height);
  draw();
}

// ResizeObserver watches the mapwrap div directly — fires when its pixel box changes
// regardless of what caused the change (window resize, dossier load, etc.)
const _mapResizeObs = new ResizeObserver(() => resizeCanvas());
_mapResizeObs.observe(document.getElementById('mapwrap'));

function filteredDevices() {
  return devices.filter(d => {
    if (filter==='online'  && !d.online)  return false;
    if (filter==='offline' && d.online)   return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      if (!(d.ip||'').includes(q)
        && !(d.hostname||'').toLowerCase().includes(q)
        && !(d.device_type||'').toLowerCase().includes(q)
        && !(d.vendor||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

// Animated pulse rings
let tick = 0;
function draw() {
  tick++;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  if (!nodes.length) { ctx.restore(); return; }

  // Draw connecting lines between close neighbours (aesthetic only)
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dist = Math.hypot(a.x-b.x, a.y-b.y);
      if (dist < CELL_W * 1.5) {
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        const alpha = (1 - dist/(CELL_W*1.5)) * (a.online && b.online ? 0.08 : 0.03);
        ctx.strokeStyle = `rgba(0,200,240,${alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }

  // Draw nodes
  nodes.forEach(n => {
    const isSel = selected && selected.ip === n.ip;
    const isHov = hovered && hovered.ip === n.ip;
    const isDrg = dragNode && dragNode.ip === n.ip;
    const color = dColor(n);
    const r = n.r + (isSel ? 5 : 0) + (isDrg ? 3 : 0);

    // Pulse ring for online nodes
    if (n.online && (isSel || isHov)) {
      const pulse = (Math.sin(tick * 0.06) * 0.5 + 0.5);
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 8 + pulse * 6, 0, Math.PI*2);
      ctx.strokeStyle = color + '30';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    ctx.shadowColor = color;
    ctx.shadowBlur  = isSel ? 22 : isHov ? 14 : (n.online ? 6 : 0);

    // Fill
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    if (n.online) {
      ctx.fillStyle = isSel ? color+'55' : color+'18';
    } else {
      ctx.fillStyle = 'rgba(30,8,12,.9)';
    }
    ctx.fill();

    // Border
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.strokeStyle = n.online ? (isSel ? color : color+'99') : 'rgba(240,48,80,.35)';
    ctx.lineWidth = isSel ? 2.5 : 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Icon
    ctx.fillStyle = n.online ? color : '#4a1520';
    ctx.font = `${Math.round(r*0.72)}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(dIcon(n), n.x, n.y);

    // Offline X
    if (!n.online) {
      ctx.fillStyle = '#f03050cc';
      ctx.font = '9px monospace';
      ctx.fillText('✕', n.x + r*0.62, n.y - r*0.62);
    }

    // Label
    const label = (n.hostname && n.hostname !== n.ip) ? n.hostname : n.ip;
    const lshort = label.length > 16 ? label.slice(0,14)+'…' : label;
    ctx.fillStyle = isSel ? color : (n.online ? 'rgba(184,216,240,.85)' : 'rgba(120,60,70,.8)');
    ctx.font = `${isSel?'600 ':''} 11px 'Share Tech Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(lshort, n.x, n.y + r + 4);
    ctx.fillStyle = 'rgba(58,88,120,.75)';
    ctx.font = '9px monospace';
    ctx.fillText(n.ip, n.x, n.y + r + 17);
  });

  ctx.restore();
}

let raf;
function animate(){ draw(); raf = requestAnimationFrame(animate); }

// ─── Coord helpers ───────────────────────────────────────────────────────────
function toWorld(ex, ey) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (ex - rect.left - panX) / zoom,
    y: (ey - rect.top  - panY) / zoom
  };
}
function nodeAt(wx, wy) {
  // search in reverse so top-rendered nodes (drawn last) get priority
  for (let i = nodes.length-1; i >= 0; i--) {
    const n = nodes[i];
    if (Math.hypot(n.x-wx, n.y-wy) <= n.r + 5) return n;
  }
  return null;
}

// ─── Mouse events ────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  const w = toWorld(e.clientX, e.clientY);
  const n = nodeAt(w.x, w.y);
  if (n) {
    dragNode  = n;
    dragOffX  = w.x - n.x;
    dragOffY  = w.y - n.y;
    didDrag   = false;
    canvas.style.cursor = 'grabbing';
  } else {
    isPanning = true;
    panStart  = {x: e.clientX - panX, y: e.clientY - panY};
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mousemove', e => {
  const w = toWorld(e.clientX, e.clientY);

  if (dragNode) {
    const newX = w.x - dragOffX;
    const newY = w.y - dragOffY;
    if (Math.hypot(newX - dragNode.x, newY - dragNode.y) > 3) didDrag = true;
    dragNode.x = newX;
    dragNode.y = newY;
    document.getElementById('tt').style.display = 'none';
    return;
  }

  if (isPanning) {
    panX = e.clientX - panStart.x;
    panY = e.clientY - panStart.y;
    canvas.style.cursor = 'grabbing';
    return;
  }

  // Hover
  const n = nodeAt(w.x, w.y);
  hovered = n || null;
  const tt = document.getElementById('tt');
  if (n) {
    canvas.style.cursor = 'pointer';
    const lat = n.latency_ms != null ? n.latency_ms.toFixed(1)+' ms' : '—';
    const oc  = n.online ? 'tton' : 'ttoff';
    const ol  = n.online ? '● ONLINE' : '✕ OFFLINE';
    tt.innerHTML = `
      <div class="ttn">${esc(n.hostname!==n.ip?n.hostname:n.ip)}</div>
      <div class="ttr"><span class="ttk">STATUS</span><span class="ttv ${oc}">${ol}</span></div>
      <div class="ttr"><span class="ttk">IP</span><span class="ttv">${esc(n.ip)}</span></div>
      <div class="ttr"><span class="ttk">MAC</span><span class="ttv">${esc(n.mac||'—')}</span></div>
      <div class="ttr"><span class="ttk">OS</span><span class="ttv">${esc(n.os_guess||'—')}</span></div>
      <div class="ttr"><span class="ttk">TYPE</span><span class="ttv">${esc(n.device_type||'—')}</span></div>
      <div class="ttr"><span class="ttk">LATENCY</span><span class="ttv">${lat}</span></div>`;
    tt.style.display = 'block';
    tt.style.left = (e.clientX+16)+'px';
    tt.style.top  = Math.min(e.clientY-10, window.innerHeight-210)+'px';
  } else {
    canvas.style.cursor = 'grab';
    tt.style.display = 'none';
  }
});

window.addEventListener('mouseup', e => {
  if (dragNode) {
    if (!didDrag) {
      // treat as click — select node
      selected = dragNode;
      loadDetail(dragNode.ip);
    }
    dragNode = null;
    canvas.style.cursor = 'grab';
  }
  if (isPanning) {
    isPanning = false;
    canvas.style.cursor = 'grab';
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.1 : 0.9;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - f*(mx-panX);
  panY = my - f*(my-panY);
  zoom = Math.max(0.25, Math.min(4, zoom*f));
}, {passive:false});

canvas.addEventListener('mouseleave', () => {
  document.getElementById('tt').style.display = 'none';
  hovered = null;
});

// ─── DETAIL / DOSSIER ────────────────────────────────────────────────────────
async function loadDetail(ip) {
  const dos = document.getElementById('dossier');
  dos.innerHTML = `<div id="dempty"><div>LOADING DEVICE DATA…</div></div>`;
  try {
    const r = await fetch(`/api/devices/${encodeURIComponent(ip)}`);
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    // Update local cache
    const idx = devices.findIndex(x=>x.ip===ip);
    if (idx>=0) { devices[idx]=d; updateStats(); }
    renderDossier(d);
  } catch(ex) {
    dos.innerHTML = `<div id="dempty"><div style="color:var(--danger)">ERROR: ${esc(String(ex))}</div></div>`;
  }
}

  const latPct  = d.latency_ms != null ? Math.min(d.latency_ms/200*100,100) : 0;

  const lastSeen= d.last_seen ? new Date(d.last_seen).toLocaleString() : '—';

  const ip      = d.ip || '';

        <div class="port-dot"></div>
        <div class="port-num">${p.port}/tcp</div>
        <div class="port-svc">${esc(p.service)}</div>
      </div>`).join('');
  } else {
    portsHtml = `<div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">No open ports detected on common ports scan.</div>`;
  }

  dos.innerHTML = `
  <div class="dos-wrap fade-up">
    <!-- LEFT: identity column -->
    <div class="dos-id">
      <div class="dos-id-top">
        <div class="dos-badge" style="color:${color};border-color:${color};box-shadow:0 0 16px ${color}40">
          <span>${dIcon(d)}</span>
          <div class="dos-badge-status ${online?'online':'offline'}"></div>
        </div>
        <div class="dos-hostname">${esc(hostname!==ip?hostname:'['+ip+']')}</div>
        <div class="dos-ip">${esc(ip)}</div>
        <div style="text-align:center;margin-top:6px">
          <span class="dos-status-label ${online?'online':'offline'}">${online?'● ONLINE':'✕ OFFLINE'}</span>
        </div>
      </div>
      <div class="dos-fields">
        <div class="dos-field">
          <div class="dos-field-key">Device Type</div>
          <div class="dos-field-val accent">${esc(d.device_type||'Unknown')}</div>
        </div>
        <div class="dos-field">
          <div class="dos-field-key">Latency</div>
          <div class="dos-field-val ${latCls==='good'?'green':latCls==='ok'?'warn':latCls==='bad'?'danger':'muted'}">${lat}</div>
          ${lat!=='—'?`<div class="lat-bar-wrap"><div class="lat-bar ${latCls}" style="width:${latPct}%"></div></div>`:''}
        </div>
        <div class="dos-field">
          <div class="dos-field-key">Last Seen</div>
          <div class="dos-field-val" style="font-size:10px">${esc(lastSeen)}</div>
        </div>
        <div class="dos-field">
          <div class="dos-field-key">Open Ports</div>
          <div class="dos-field-val ${ports.length?'accent':'muted'}">${ports.length ? ports.length+' detected' : 'none'}</div>
        </div>
      </div>
    </div>

    <!-- RIGHT: detail sections -->
    <div class="dos-main">
      <div class="dos-hdr">
        <span class="dos-hdr-title">DEVICE DOSSIER</span>
        <span class="dos-hdr-ip">// ${esc(ip)}</span>
        <div class="dos-hdr-sp"></div>
        <button class="dos-action ping"  onclick="doPing('${esc(ip)}')">PING</button>
        <button class="dos-action trace" onclick="doTrace('${esc(ip)}')">TRACEROUTE</button>
        <button class="dos-action scan"  onclick="doRescan('${esc(ip)}')">RE-SCAN</button>
      </div>
      <div class="dos-sections">

        <!-- NETWORK IDENTITY -->
        <div class="dos-section">
          <div class="dos-section-hdr">Network Identity</div>
          <div class="dos-section-body">
            <div class="dos-grid">
              <div class="dos-gfield">
                <div class="dos-gkey">IP Address</div>
                <div class="dos-gval accent">${esc(ip)}</div>
              </div>
              <div class="dos-gfield">
                <div class="dos-gkey">Hostname</div>
                <div class="dos-gval">${esc(hostname)}</div>
              </div>
              <div class="dos-gfield">
                <div class="dos-gkey">MAC Address</div>
                <div class="dos-gval">${esc(d.mac||'—')}</div>
              </div>
              <div class="dos-gfield">
                <div class="dos-gkey">Manufacturer</div>

// ─── Actions ─────────────────────────────────────────────────────────────────
async function doPing(ip) {
  showTerm('PING — '+ip, `$ ping -c 4 ${ip}\n`);
  try {
    const r = await fetch(`/api/ping?ip=${encodeURIComponent(ip)}`);
    const d = await r.json();
    appendTerm(d.output||d.error||'no output');
  } catch(e){ appendTerm('Error: '+e); }
}

async function doTrace(ip) {
  showTerm('TRACEROUTE — '+ip, `$ traceroute ${ip}\n`);
  try {
    const r = await fetch(`/api/traceroute?ip=${encodeURIComponent(ip)}`);
    const d = await r.json();
    appendTerm(d.output||d.error||'no output');
  } catch(e){ appendTerm('Error: '+e); }
}

async function doRescan(ip) {
  const btn = document.querySelector('.dos-action.scan');
  if (btn) { btn.disabled=true; btn.textContent='SCANNING…'; }
  try {
    const r = await fetch(`/api/devices/${encodeURIComponent(ip)}`);
    const d = await r.json();
    const idx = devices.findIndex(x=>x.ip===ip);
    if (idx>=0) { devices[idx]=d; updateStats(); }
    // Update node in map
    const ni = nodes.findIndex(n=>n.ip===ip);
    if (ni>=0) { nodes[ni] = {...nodes[ni], ...d}; }
    renderDossier(d);
  } catch(e){
    if (btn) { btn.disabled=false; btn.textContent='RE-SCAN'; }
  }
}

function showTerm(label, initial) {
  const sec = document.getElementById('term-section');
  if (!sec) return;
  sec.style.display = '';
  document.getElementById('term-label').textContent = label;
  document.getElementById('term-out').textContent = initial;
  sec.scrollIntoView({behavior:'smooth'});
}
function appendTerm(text) {
  const el = document.getElementById('term-out');
  if (el) { el.textContent += text; el.scrollTop = el.scrollHeight; }
}

// ─── Scan ─────────────────────────────────────────────────────────────────────
async function startScan() {
  try { await fetch('/api/scan',{method:'POST'}); } catch(e){}
  document.getElementById('bscan').disabled = true;
  showOverlay();
  pollScan();
}

function showOverlay(){ document.getElementById('sovl').classList.add('vis'); }
function hideOverlay(){ document.getElementById('sovl').classList.remove('vis'); }

function pollScan() {
  if (scanPoll) clearInterval(scanPoll);
  const msgs = ['INITIALIZING…','ARP SWEEP…','IDENTIFYING DEVICES…','PORT SCANNING…','OS DETECTION…','FINALIZING…'];
  scanPoll = setInterval(async ()=>{
    try {
      const r  = await fetch('/api/scan/status');
      const st = await r.json();
      const pct = st.progress||0;
      document.getElementById('sbf').style.width = pct+'%';
      document.getElementById('sovmsg').textContent = msgs[Math.min(Math.floor(pct/18),msgs.length-1)];
      document.getElementById('pgwrap').style.display = 'block';
      document.getElementById('pgfill').style.width = pct+'%';
      if (!st.running) {
        clearInterval(scanPoll); scanPoll=null;
        hideOverlay();
        document.getElementById('bscan').disabled=false;
        document.getElementById('pgwrap').style.display='none';
        await refreshDevices();
      }
    } catch(e){}
  }, 800);
}

async function doHealth() {
  document.getElementById('bhealth').disabled = true;
  try { await fetch('/api/health',{method:'POST'}); } catch(e){}
  setTimeout(async ()=>{
    await refreshDevices();
    document.getElementById('bhealth').disabled=false;
  }, 7000);
}

async function refreshDevices() {
  try {
    const r = await fetch('/api/devices');
    const fresh = await r.json();
    // Merge: preserve node positions, update data
    fresh.forEach(d => {
      const ni = nodes.findIndex(n=>n.ip===d.ip);
      if (ni>=0) { nodes[ni] = {...nodes[ni], ...d}; }
    });
    devices = fresh;
    updateStats();
    // Re-layout only new devices (ones not in nodes yet)
    const newDevs = filteredDevices().filter(d => !nodes.find(n=>n.ip===d.ip));
    if (newDevs.length) {
      const startIdx = nodes.length;
      newDevs.forEach((d,i) => {
        const idx = startIdx + i;
        const col = idx % COLS;
        const row = Math.floor(idx / COLS);
        nodes.push({ ...d, x: MARGIN+col*CELL_W+CELL_W/2, y: MARGIN+row*CELL_H+CELL_H/2, r: NODE_R });
      });
    }
  } catch(e){}
}

function updateStats() {
  const on = devices.filter(d=>d.online).length;
  document.getElementById('st').textContent = devices.length;
  document.getElementById('so').textContent = on;
  document.getElementById('sf').textContent = devices.length - on;
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  nodes = layoutNodes(filteredDevices());
}

function onSearch(q) {
  searchQ = q;
  nodes = layoutNodes(filteredDevices());
}

// ─── Network Info ─────────────────────────────────────────────────────────────
async function loadNetInfo() {
  try {
    const r = await fetch('/api/network');
    const d = await r.json();
    document.getElementById('hnet').textContent  = d.network  || '—';
    document.getElementById('hhost').textContent = d.hostname || '—';
  } catch(e){}
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  // resizeCanvas is handled by ResizeObserver on #mapwrap — no window listener needed
  resizeCanvas();
  animate();
  loadNetInfo();
  try {
    const r  = await fetch('/api/scan/status');
    const st = await r.json();
    if (st.running) {
      showOverlay();
      document.getElementById('bscan').disabled = true;
      pollScan();
    } else if (st.last_scan) {
      hideOverlay();
      await refreshDevices();
    } else {
      showOverlay();
      document.getElementById('bscan').disabled = true;
      pollScan();
    }
  } catch(e) {
    setTimeout(init, 1500);
    return;
  }
  setInterval(async()=>{ try{ await fetch('/api/health',{method:'POST'}); setTimeout(refreshDevices,8000); }catch(e){} }, 60000);
  setInterval(refreshDevices, 15000);
}

init();
</script>
