<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetAdmin Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* ─── Variables ─────────────────────────────────────────────────────────── */
:root {
  --bg:        #080d14;
  --panel:     #0d1520;
  --border:    #1a2d45;
  --accent:    #00d4ff;
  --accent2:   #00ff88;
  --warn:      #ffaa00;
  --danger:    #ff3355;
  --text:      #c8e0f4;
  --muted:     #4a6a8a;
  --glow:      0 0 12px rgba(0,212,255,0.35);
  --glow2:     0 0 12px rgba(0,255,136,0.35);
  --font-ui:   'Exo 2', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --radius:    6px;
}

/* ─── Reset & Base ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  display: flex;
  flex-direction: column;
}

/* Scanline overlay */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.06) 2px,
    rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
}

/* ─── Header ────────────────────────────────────────────────────────────── */
#header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
#header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: scanH 4s linear infinite;
}
@keyframes scanH { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

.logo {
  font-family: var(--font-mono);
  font-size: 20px;
  color: var(--accent);
  letter-spacing: 3px;
  text-shadow: var(--glow);
  white-space: nowrap;
}
.logo span { color: var(--accent2); text-shadow: var(--glow2); }

#net-info {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  margin-left: 8px;
}
#net-info b { color: var(--accent); }

.hdr-spacer { flex: 1; }

#stats-bar {
  display: flex;
  gap: 20px;
  font-family: var(--font-mono);
  font-size: 12px;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.stat-val { font-size: 20px; font-weight: 700; line-height: 1; }
.stat-val.online  { color: var(--accent2); text-shadow: var(--glow2); }
.stat-val.offline { color: var(--danger); }
.stat-val.total   { color: var(--accent); text-shadow: var(--glow); }
.stat-lbl { color: var(--muted); font-size: 10px; letter-spacing: 1px; }

#btn-scan, #btn-health {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 7px 18px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  border-radius: var(--radius);
  letter-spacing: 1px;
  transition: all .2s;
  text-transform: uppercase;
}
#btn-scan:hover  { background: var(--accent); color: var(--bg); box-shadow: var(--glow); }
#btn-health { border-color: var(--accent2); color: var(--accent2); margin-left: 6px; }
#btn-health:hover { background: var(--accent2); color: var(--bg); box-shadow: var(--glow2); }
button:disabled { opacity: .4; cursor: not-allowed; }

/* ─── Progress Bar ──────────────────────────────────────────────────────── */
#progress-wrap {
  height: 3px;
  background: var(--border);
  flex-shrink: 0;
  display: none;
}
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  box-shadow: 0 0 8px var(--accent);
  transition: width .4s;
  width: 0%;
}

/* ─── Main Layout ───────────────────────────────────────────────────────── */
#main {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
  gap: 0;
}

/* ─── Map Panel ─────────────────────────────────────────────────────────── */
#map-panel {
  flex: 0 0 55%;
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

#map-toolbar {
  display: flex;
  align-items: center;
  padding: 6px 14px;
  background: rgba(13,21,32,0.9);
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-shrink: 0;
  font-size: 11px;
  font-family: var(--font-mono);
}
.map-title { color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
.map-spacer { flex: 1; }
.filter-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 3px 10px;
  border-radius: 3px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 10px;
  transition: all .2s;
}
.filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
#search-box {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 3px 10px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  width: 160px;
  outline: none;
}
#search-box:focus { border-color: var(--accent); }
#search-box::placeholder { color: var(--muted); }

#map-canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#map-canvas {
  width: 100%; height: 100%;
  display: block;
  cursor: grab;
}
#map-canvas:active { cursor: grabbing; }

/* ─── Tooltip ───────────────────────────────────────────────────────────── */
#tooltip {
  position: fixed;
  background: rgba(8,13,20,0.97);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.7;
  pointer-events: none;
  z-index: 9000;
  display: none;
  min-width: 220px;
  box-shadow: 0 0 20px rgba(0,212,255,0.2);
}
#tooltip .tt-name { color: var(--accent); font-size: 13px; font-weight: bold; margin-bottom: 4px; }
#tooltip .tt-row  { display: flex; gap: 8px; }
#tooltip .tt-key  { color: var(--muted); width: 60px; flex-shrink: 0; }
#tooltip .tt-val  { color: var(--text); }
#tooltip .tt-online  { color: var(--accent2); }
#tooltip .tt-offline { color: var(--danger); }

/* ─── Detail Panel ──────────────────────────────────────────────────────── */
#detail-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#detail-header {
  padding: 8px 16px;
  background: rgba(13,21,32,0.9);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  font-family: var(--font-mono);
  font-size: 11px;
}
.detail-title { color: var(--accent2); letter-spacing: 2px; text-transform: uppercase; }

#detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  align-content: start;
}
#detail-body::-webkit-scrollbar { width: 4px; }
#detail-body::-webkit-scrollbar-thumb { background: var(--border); }

#detail-empty {
  grid-column: 1/-1;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 13px;
  text-align: center;
  line-height: 2;
}

/* ─── Info Cards ────────────────────────────────────────────────────────── */
.info-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s;
}
.info-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0.5;
}
.info-card:hover { border-color: var(--accent); }
.card-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.card-value {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text);
  word-break: break-all;
}
.card-value.accent  { color: var(--accent); text-shadow: var(--glow); }
.card-value.green   { color: var(--accent2); text-shadow: var(--glow2); }
.card-value.warn    { color: var(--warn); }
.card-value.danger  { color: var(--danger); }

.ports-list {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 4px;
}
.port-badge {
  background: rgba(0,212,255,0.1);
  border: 1px solid rgba(0,212,255,0.3);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  white-space: nowrap;
}
.port-badge.svc { color: var(--accent2); border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.08); }

.span-2 { grid-column: span 2; }
.span-3 { grid-column: span 3; }

/* ─── Scan overlay ──────────────────────────────────────────────────────── */
#scan-overlay {
  position: absolute; inset: 0;
  background: rgba(8,13,20,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 100;
  font-family: var(--font-mono);
}
#scan-overlay.visible { display: flex; }
.scan-msg { color: var(--accent); font-size: 14px; letter-spacing: 2px; }
.scan-bar-wrap { width: 300px; height: 4px; background: var(--border); border-radius: 2px; }
.scan-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 2px;
  box-shadow: 0 0 8px var(--accent);
  transition: width .4s;
}

/* ─── Device Type Icons (emoji fallback) ────────────────────────────────── */
.dev-icon { font-size: 13px; }

/* ─── Responsive Tweaks ─────────────────────────────────────────────────── */
@media (max-width: 900px) {
  #detail-body { grid-template-columns: 1fr 1fr; }
  .span-3 { grid-column: span 2; }
}
@media (max-width: 600px) {
  #detail-body { grid-template-columns: 1fr; }
  .span-2, .span-3 { grid-column: span 1; }
  #stats-bar .stat:nth-child(n+3) { display: none; }
}

/* ─── Animations ────────────────────────────────────────────────────────── */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.fade-in { animation: fadeIn .3s ease; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="logo">NET<span>ADMIN</span></div>
  <div id="net-info">NETWORK: <b id="hdr-net">—</b> &nbsp;|&nbsp; HOST: <b id="hdr-host">—</b></div>
  <div class="hdr-spacer"></div>
  <div id="stats-bar">
    <div class="stat"><div class="stat-val total" id="st-total">0</div><div class="stat-lbl">TOTAL</div></div>
    <div class="stat"><div class="stat-val online" id="st-online">0</div><div class="stat-lbl">ONLINE</div></div>
    <div class="stat"><div class="stat-val offline" id="st-offline">0</div><div class="stat-lbl">OFFLINE</div></div>
  </div>
  <button id="btn-scan" onclick="startScan()">⟳ SCAN</button>
  <button id="btn-health" onclick="healthCheck()">♥ HEALTH</button>
</div>

<!-- Progress -->
<div id="progress-wrap"><div id="progress-fill"></div></div>

<!-- Main -->
<div id="main">

  <!-- Map Panel -->
  <div id="map-panel">
    <div id="map-toolbar">
      <span class="map-title">▸ NETWORK MAP</span>
      <div class="map-spacer"></div>
      <button class="filter-btn active" onclick="setFilter('all', this)">ALL</button>
      <button class="filter-btn" onclick="setFilter('online', this)">ONLINE</button>
      <button class="filter-btn" onclick="setFilter('offline', this)">OFFLINE</button>
      <input id="search-box" type="text" placeholder="search host / ip…" oninput="onSearch(this.value)">
    </div>
    <div id="map-canvas-wrap">
      <canvas id="map-canvas"></canvas>
      <div id="scan-overlay">
        <div class="scan-msg" id="scan-msg">SCANNING NETWORK…</div>
        <div class="scan-bar-wrap"><div class="scan-bar-fill" id="scan-bar-fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- Detail Panel -->
  <div id="detail-panel">
    <div id="detail-header">
      <span class="detail-title">▸ DEVICE DETAIL</span>
      <span id="detail-ip" style="color:var(--muted)">— select a device on the map —</span>
    </div>
    <div id="detail-body">
      <div id="detail-empty">
        <div>
          ◈ CLICK ANY DEVICE TO INSPECT<br>
          <span style="font-size:11px;color:#2a4a6a">hover for quick info · click for full analysis</span>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let devices    = [];
let filter     = 'all';
let searchQ    = '';
let selected   = null;
let scanPoll   = null;
let healthPoll = null;
let nodes      = [];          // positioned device nodes for canvas
let hovered    = null;
let dragging   = false;
let dragStart  = {x:0,y:0};
let viewOffset = {x:0,y:0};
let viewScale  = 1;

const canvas = document.getElementById('map-canvas');
const ctx    = canvas.getContext('2d');

// ─── Device type → icon mapping ─────────────────────────────────────────────
const TYPE_ICONS = {
  'Router/Switch':    '⬡',
  'Windows PC':       '⊞',
  'Linux Server':     '⬛',
  'Linux/SSH Device': '⬛',
  'Web Server':       '⬡',
  'DNS Server':       '◈',
  'Apple Device':     '◍',
  'Smart TV/Media':   '▣',
  'Mobile/IoT':       '◎',
  'SBC/IoT':          '◈',
  'Network Device':   '⬡',
  'Windows/Samba':    '⊞',
  'This Host':        '★',
  'Unknown Device':   '○',
};

const TYPE_COLORS = {
  'Router/Switch':    '#00d4ff',
  'Windows PC':       '#6688ff',
  'Linux Server':     '#00ff88',
  'Linux/SSH Device': '#00ff88',
  'Web Server':       '#ffaa00',
  'DNS Server':       '#ff88ff',
  'Apple Device':     '#aaaaff',
  'Smart TV/Media':   '#ff6644',
  'Mobile/IoT':       '#ffdd44',
  'SBC/IoT':          '#44ffdd',
  'Network Device':   '#00d4ff',
  'Windows/Samba':    '#6688ff',
  'This Host':        '#ffffff',
  'Unknown Device':   '#4a6a8a',
};

function deviceColor(d) {
  if (!d.online) return '#3a2a2a';
  return TYPE_COLORS[d.device_type] || '#4a6a8a';
}

function deviceIcon(d) {
  if (d.is_self) return '★';
  return TYPE_ICONS[d.device_type] || '○';
}

// ─── Layout ──────────────────────────────────────────────────────────────────
function layoutNodes(devs) {
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const r  = Math.min(w, h) * 0.38;

  // Put self (or router) in center; rest in circles
  const self   = devs.find(d => d.is_self);
  const others = devs.filter(d => !d.is_self);

  const positioned = [];

  if (self) {
    positioned.push({ ...self, x: cx, y: cy, r: 28 });
  }

  const count = others.length;
  others.forEach((d, i) => {
    const angle = (i / count) * 2 * Math.PI - Math.PI / 2;
    // Spread across 1-3 rings depending on count
    const ring = count > 20 ? (i % 3 + 1) : (count > 8 ? (i % 2 + 1) : 1);
    const ringR = r * (0.55 + ring * 0.22);
    positioned.push({
      ...d,
      x: cx + Math.cos(angle) * ringR,
      y: cy + Math.sin(angle) * ringR,
      r: 20,
    });
  });
  return positioned;
}

// ─── Canvas Draw ─────────────────────────────────────────────────────────────
function resizeCanvas() {
  const wrap = document.getElementById('map-canvas-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  nodes = layoutNodes(filteredDevices());
  draw();
}

function filteredDevices() {
  return devices.filter(d => {
    if (filter === 'online'  && !d.online)  return false;
    if (filter === 'offline' && d.online)   return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      const match = (d.ip||'').includes(q)
        || (d.hostname||'').toLowerCase().includes(q)
        || (d.device_type||'').toLowerCase().includes(q)
        || (d.vendor||'').toLowerCase().includes(q);
      if (!match) return false;
    }
    return true;
  });
}

function draw() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.save();
  ctx.translate(viewOffset.x, viewOffset.y);
  ctx.scale(viewScale, viewScale);

  if (!nodes.length) {
    ctx.restore();
    return;
  }

  const cx = nodes.find(n => n.is_self);
  const center = cx || nodes[0];

  // Draw connections from center to others
  nodes.forEach(n => {
    if (n === center) return;
    const online = n.online;
    ctx.beginPath();
    ctx.moveTo(center.x, center.y);
    ctx.lineTo(n.x, n.y);
    ctx.strokeStyle = online ? 'rgba(0,212,255,0.12)' : 'rgba(255,51,85,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Animated dots along lines (pseudo via static draw at offset)
    if (online) {
      const t = (Date.now() / 2000 + nodes.indexOf(n) * 0.2) % 1;
      const dx = n.x - center.x, dy = n.y - center.y;
      const px = center.x + dx * t, py = center.y + dy * t;
      ctx.beginPath();
      ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,212,255,0.5)';
      ctx.fill();
    }
  });

  // Draw nodes
  nodes.forEach(n => {
    const isSelected = selected && selected.ip === n.ip;
    const isHovered  = hovered && hovered.ip === n.ip;
    const color = deviceColor(n);
    const nr = n.r + (isSelected ? 4 : 0);

    // Glow
    if (n.online) {
      ctx.shadowColor = color;
      ctx.shadowBlur  = isSelected ? 24 : isHovered ? 16 : 8;
    } else {
      ctx.shadowBlur = 0;
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, nr, 0, Math.PI * 2);
    ctx.fillStyle = n.online
      ? (isSelected ? color + 'cc' : color + '22')
      : 'rgba(40,10,15,0.8)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(n.x, n.y, nr, 0, Math.PI * 2);
    ctx.strokeStyle = n.online
      ? (isSelected ? color : color + '88')
      : 'rgba(255,51,85,0.4)';
    ctx.lineWidth = isSelected ? 2.5 : 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Icon
    ctx.fillStyle = n.online ? color : '#553333';
    ctx.font = `${Math.round(nr * 0.75)}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(deviceIcon(n), n.x, n.y);

    // Offline X badge
    if (!n.online) {
      ctx.fillStyle = '#ff3355';
      ctx.font = '10px monospace';
      ctx.fillText('✕', n.x + nr * 0.65, n.y - nr * 0.65);
    }

    // Label below
    const label = n.hostname !== n.ip ? n.hostname : n.ip;
    const shortLabel = label.length > 18 ? label.substring(0, 16) + '…' : label;
    ctx.fillStyle = isSelected ? color : (n.online ? 'rgba(200,224,244,0.8)' : 'rgba(100,60,60,0.8)');
    ctx.font = `${isSelected ? 'bold ' : ''}11px 'Share Tech Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(shortLabel, n.x, n.y + nr + 5);
    ctx.fillStyle = 'rgba(74,106,138,0.7)';
    ctx.font = '10px monospace';
    ctx.fillText(n.ip, n.x, n.y + nr + 18);
  });

  ctx.restore();
}

let animFrame;
function animate() {
  draw();
  animFrame = requestAnimationFrame(animate);
}

// ─── Mouse interaction ────────────────────────────────────────────────────────
function canvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left - viewOffset.x) / viewScale,
    y: (e.clientY - rect.top  - viewOffset.y) / viewScale
  };
}

function nodeAt(cx, cy) {
  return nodes.find(n => Math.hypot(n.x - cx, n.y - cy) <= n.r + 6);
}

canvas.addEventListener('mousemove', e => {
  const c = canvasCoords(e);
  const node = nodeAt(c.x, c.y);
  hovered = node || null;

  const tt = document.getElementById('tooltip');
  if (node) {
    canvas.style.cursor = 'pointer';
    const lat = node.latency_ms != null ? node.latency_ms.toFixed(1) + ' ms' : '—';
    const onClass = node.online ? 'tt-online' : 'tt-offline';
    const onLabel = node.online ? '● ONLINE' : '✕ OFFLINE';
    tt.innerHTML = `
      <div class="tt-name">${escHtml(node.hostname !== node.ip ? node.hostname : node.ip)}</div>
      <div class="tt-row"><span class="tt-key">STATUS</span><span class="tt-val ${onClass}">${onLabel}</span></div>
      <div class="tt-row"><span class="tt-key">IP</span><span class="tt-val">${escHtml(node.ip)}</span></div>
      <div class="tt-row"><span class="tt-key">MAC</span><span class="tt-val">${escHtml(node.mac||'—')}</span></div>
      <div class="tt-row"><span class="tt-key">OS</span><span class="tt-val">${escHtml(node.os_guess||'—')}</span></div>
      <div class="tt-row"><span class="tt-key">TYPE</span><span class="tt-val">${escHtml(node.device_type||'—')}</span></div>
      <div class="tt-row"><span class="tt-key">LATENCY</span><span class="tt-val">${lat}</span></div>
    `;
    tt.style.display = 'block';
    tt.style.left = (e.clientX + 16) + 'px';
    tt.style.top  = Math.min(e.clientY - 10, window.innerHeight - 200) + 'px';
  } else {
    canvas.style.cursor = dragging ? 'grabbing' : 'grab';
    tt.style.display = 'none';
  }

  if (dragging) {
    viewOffset.x += e.clientX - dragStart.x;
    viewOffset.y += e.clientY - dragStart.y;
    dragStart = {x: e.clientX, y: e.clientY};
  }
});

canvas.addEventListener('mousedown', e => {
  const c = canvasCoords(e);
  if (!nodeAt(c.x, c.y)) {
    dragging = true;
    dragStart = {x: e.clientX, y: e.clientY};
  }
});

window.addEventListener('mouseup', () => { dragging = false; });

canvas.addEventListener('click', e => {
  const c = canvasCoords(e);
  const node = nodeAt(c.x, c.y);
  if (node) {
    selected = node;
    loadDetail(node.ip);
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  viewOffset.x = mx - factor * (mx - viewOffset.x);
  viewOffset.y = my - factor * (my - viewOffset.y);
  viewScale *= factor;
  viewScale = Math.max(0.3, Math.min(4, viewScale));
}, { passive: false });

canvas.addEventListener('mouseleave', () => {
  document.getElementById('tooltip').style.display = 'none';
  hovered = null;
});

// ─── Detail Panel ─────────────────────────────────────────────────────────────
async function loadDetail(ip) {
  const body = document.getElementById('detail-body');
  document.getElementById('detail-ip').textContent = ip;
  body.innerHTML = '<div id="detail-empty" style="grid-column:1/-1;color:var(--muted);font-family:var(--font-mono);padding:20px">LOADING…</div>';

  try {
    const r = await fetch(`/api/devices/${encodeURIComponent(ip)}`);
    const d = await r.json();
    renderDetail(d);
  } catch(e) {
    body.innerHTML = `<div id="detail-empty" style="grid-column:1/-1;color:var(--danger);font-family:var(--font-mono);padding:20px">ERROR: ${escHtml(String(e))}</div>`;
  }
}

function renderDetail(d) {
  const body = document.getElementById('detail-body');
  const online = d.online;
  const statusClass = online ? 'green' : 'danger';
  const statusLabel = online ? '● ONLINE' : '✕ OFFLINE';
  const lat = d.latency_ms != null ? d.latency_ms.toFixed(2) + ' ms' : '—';
  const lastSeen = d.last_seen ? new Date(d.last_seen).toLocaleString() : '—';

  const ports = (d.open_ports || []);
  const portHtml = ports.length
    ? ports.map(p => `<span class="port-badge">${p.port}</span><span class="port-badge svc">${escHtml(p.service)}</span>`).join(' ')
    : '<span style="color:var(--muted)">none detected</span>';

  body.innerHTML = `
    <div class="info-card fade-in">
      <div class="card-label">STATUS</div>
      <div class="card-value ${statusClass}">${statusLabel}</div>
    </div>
    <div class="info-card fade-in">
      <div class="card-label">IP ADDRESS</div>
      <div class="card-value accent">${escHtml(d.ip)}</div>
    </div>
    <div class="info-card fade-in">
      <div class="card-label">LATENCY</div>
      <div class="card-value ${online ? 'green' : 'danger'}">${lat}</div>
    </div>
    <div class="info-card fade-in span-2">
      <div class="card-label">HOSTNAME</div>
      <div class="card-value">${escHtml(d.hostname||'—')}</div>
    </div>
    <div class="info-card fade-in">
      <div class="card-label">DEVICE TYPE</div>
      <div class="card-value accent">${escHtml(deviceIcon(d))} ${escHtml(d.device_type||'—')}</div>
    </div>
    <div class="info-card fade-in span-2">
      <div class="card-label">MAC ADDRESS</div>
      <div class="card-value">${escHtml(d.mac||'—')}</div>
    </div>
    <div class="info-card fade-in">
      <div class="card-label">VENDOR / MFR</div>
      <div class="card-value">${escHtml(d.vendor||'Unknown')}</div>
    </div>
    <div class="info-card fade-in span-3">
      <div class="card-label">OS DETECTION</div>
      <div class="card-value warn">${escHtml(d.os_guess||'—')}</div>
    </div>
    <div class="info-card fade-in span-3">
      <div class="card-label">OPEN PORTS &amp; SERVICES</div>
      <div class="ports-list">${portHtml}</div>
    </div>
    <div class="info-card fade-in">
      <div class="card-label">LAST SEEN</div>
      <div class="card-value" style="font-size:12px">${escHtml(lastSeen)}</div>
    </div>
    <div class="info-card fade-in span-2">
      <div class="card-label">QUICK ACTIONS</div>
      <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap">
        <button onclick="pingDevice('${escHtml(d.ip)}')" style="font-family:var(--font-mono);font-size:11px;padding:4px 12px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:3px;cursor:pointer">PING</button>
        <button onclick="tracerouteDevice('${escHtml(d.ip)}')" style="font-family:var(--font-mono);font-size:11px;padding:4px 12px;border:1px solid var(--muted);background:transparent;color:var(--muted);border-radius:3px;cursor:pointer">TRACEROUTE</button>
        <button onclick="rescanDevice('${escHtml(d.ip)}')" style="font-family:var(--font-mono);font-size:11px;padding:4px 12px;border:1px solid var(--accent2);background:transparent;color:var(--accent2);border-radius:3px;cursor:pointer">RE-SCAN</button>
      </div>
    </div>
  `;
}

// ─── Quick-action terminal output ────────────────────────────────────────────
async function pingDevice(ip) {
  appendTerminal(ip, 'PING', `Running ping -c 4 ${ip} ...`);
  const r = await fetch(`/api/ping?ip=${encodeURIComponent(ip)}`);
  const d = await r.json();
  appendTerminal(ip, 'PING', d.output || d.error || 'no output');
}
async function tracerouteDevice(ip) {
  appendTerminal(ip, 'TRACEROUTE', `Running traceroute ${ip} ...`);
  const r = await fetch(`/api/traceroute?ip=${encodeURIComponent(ip)}`);
  const d = await r.json();
  appendTerminal(ip, 'TRACEROUTE', d.output || d.error || 'no output');
}
async function rescanDevice(ip) {
  const r = await fetch(`/api/devices/${encodeURIComponent(ip)}`);
  const d = await r.json();
  const i = devices.findIndex(x => x.ip === ip);
  if (i >= 0) { devices[i] = d; updateStats(); }
  renderDetail(d);
}

function appendTerminal(ip, label, text) {
  const body = document.getElementById('detail-body');
  let term = document.getElementById('terminal-card');
  if (!term) {
    const card = document.createElement('div');
    card.className = 'info-card fade-in span-3';
    card.id = 'terminal-card';
    card.innerHTML = `<div class="card-label">${label} — ${ip}</div><pre id="term-out" style="font-family:var(--font-mono);font-size:11px;color:var(--accent2);white-space:pre-wrap;max-height:140px;overflow-y:auto;margin-top:6px"></pre>`;
    body.appendChild(card);
    term = card;
  }
  const pre = document.getElementById('term-out');
  pre.textContent += '\n' + text;
  pre.scrollTop = pre.scrollHeight;
}

// ─── Scan ─────────────────────────────────────────────────────────────────────
async function startScan() {
  try {
    await fetch('/api/scan', { method: 'POST' });
  } catch(e) {}
  pollScan();
  showScanOverlay();
  document.getElementById('btn-scan').disabled = true;
}

function showScanOverlay() {
  document.getElementById('scan-overlay').classList.add('visible');
}
function hideScanOverlay() {
  document.getElementById('scan-overlay').classList.remove('visible');
}

function pollScan() {
  if (scanPoll) clearInterval(scanPoll);
  scanPoll = setInterval(async () => {
    try {
      const r  = await fetch('/api/scan/status');
      const st = await r.json();
      const pct = st.progress || 0;
      document.getElementById('scan-bar-fill').style.width = pct + '%';
      const msgs = ['INITIALIZING…','ARP SWEEP…','IDENTIFYING DEVICES…','PORT SCANNING…','OS DETECTION…','FINALIZING…'];
      const mi = Math.min(Math.floor(pct/18), msgs.length-1);
      document.getElementById('scan-msg').textContent = msgs[mi];

      // Global progress bar
      document.getElementById('progress-wrap').style.display = 'block';
      document.getElementById('progress-fill').style.width = pct + '%';

      if (!st.running) {
        clearInterval(scanPoll);
        scanPoll = null;
        hideScanOverlay();
        document.getElementById('btn-scan').disabled = false;
        document.getElementById('progress-wrap').style.display = 'none';
        await refreshDevices();
      }
    } catch(e) {}
  }, 800);
}

async function healthCheck() {
  document.getElementById('btn-health').disabled = true;
  await fetch('/api/health', { method: 'POST' });
  setTimeout(async () => {
    await refreshDevices();
    document.getElementById('btn-health').disabled = false;
  }, 6000);
}

async function refreshDevices() {
  try {
    const r = await fetch('/api/devices');
    devices = await r.json();
    updateStats();
    nodes = layoutNodes(filteredDevices());
  } catch(e) {}
}

function updateStats() {
  const total   = devices.length;
  const online  = devices.filter(d => d.online).length;
  const offline = total - online;
  document.getElementById('st-total').textContent   = total;
  document.getElementById('st-online').textContent  = online;
  document.getElementById('st-offline').textContent = offline;
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  nodes = layoutNodes(filteredDevices());
}

function onSearch(q) {
  searchQ = q;
  nodes = layoutNodes(filteredDevices());
}

// ─── Network Info ──────────────────────────────────────────────────────────────
async function loadNetInfo() {
  try {
    const r = await fetch('/api/network');
    const d = await r.json();
    document.getElementById('hdr-net').textContent  = d.network || '—';
    document.getElementById('hdr-host').textContent = d.hostname || '—';
  } catch(e) {}
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', resizeCanvas);

async function init() {
  resizeCanvas();
  animate();
  loadNetInfo();

  // Check if scan is already running
  try {
    const r  = await fetch('/api/scan/status');
    const st = await r.json();
    if (st.running) {
      showScanOverlay();
      document.getElementById('btn-scan').disabled = true;
      pollScan();
    } else if (st.last_scan) {
      hideScanOverlay();
      await refreshDevices();
    } else {
      showScanOverlay();
      document.getElementById('btn-scan').disabled = true;
      pollScan();
    }
  } catch(e) {
    // server not yet ready, retry
    setTimeout(init, 1500);
    return;
  }

  // Auto health check every 60s
  setInterval(async () => {
    await fetch('/api/health', { method: 'POST' });
    setTimeout(refreshDevices, 8000);
  }, 60000);

  // Refresh devices every 15s
  setInterval(refreshDevices, 15000);
}

init();
</script>
